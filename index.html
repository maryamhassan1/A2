<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CO2 Emissions Visualizations</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: linear-gradient(180deg, #f4f1ea 0%, #fbfaf7 100%);
      color: #171717;
    }

    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 24px 48px;
    }

    h1 {
      margin: 0 0 28px;
      text-align: center;
      font-size: 2.1rem;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    section {
      padding: 20px 20px 18px;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.06);
    }

    h2 {
      margin: 0 0 8px;
      font-size: 1.3rem;
      line-height: 1.2;
    }

    .subtitle {
      color: #4f4a43;
      margin-bottom: 14px;
      font-size: 0.98rem;
      line-height: 1.4;
    }

    svg {
      display: block;
      margin: 0 auto;
      overflow: visible;
    }
  </style>
</head>
<body>
  <main>
  <h1>CO₂ emissions visualizations</h1>

  <section>
    <h2>Global CO₂ emissions are rising</h2>
    <div class="subtitle">
      Source: IMF Climate Change Indicators — CO2 emissions (sum across countries & industries)
    </div>
    <svg id="global-chart" width="900" height="480"></svg>
  </section>

  <section>
    <h2>Carbon emissions of the largest countries across Europe</h2>
    <div class="subtitle">
      Largest European countries by population • Window: 2006–2018 • Indexed to 2006 = 100
    </div>
    <svg id="europe-chart" width="900" height="520"></svg>
  </section>
  </main>

  <script src="js/global.js"></script>
  <script src="js/europe.js"></script>
</body>
</html>
